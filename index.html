/* CSS cho Loading Screen */
.qms-loader {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background-color: #ffffff; /* Màu nền lúc tải */
    z-index: 99999;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    transition: opacity 0.6s ease-out, visibility 0.6s ease-out;
}

/* Class để ẩn loading */
.qms-loader.hidden {
    opacity: 0;
    visibility: hidden;
}

/* Vòng xoay Loading */
.qms-spinner {
    border: 4px solid #f3f3f3;
    border-top: 4px solid #2563eb; /* Màu xanh dương */
    border-radius: 50%;
    width: 50px;
    height: 50px;
    animation: spin 1s linear infinite;
    margin-bottom: 15px;
}

.qms-loading-text {
    font-family: Arial, sans-serif;
    color: #4b5563;
    font-size: 16px;
    font-weight: bold;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

<script type='text/javascript'>


// ==========================================
// 1. HÀM TIỆN ÍCH ĐA NGÔN NGỮ (i18n HELPER)
// ==========================================
function t(path, defaultValue = '') {
    if (typeof translations === 'undefined' || !translations) return defaultValue;
    return path.split('.').reduce((obj, key) => obj && typeof obj[key] !== 'undefined' ? obj[key] : undefined, translations) ?? defaultValue;
}

// ==========================================
// 2. KHAI BÁO BIẾN TOÀN CỤC & SỰ KIỆN GIAO DIỆN
// ==========================================
let startX = 0, startY = 0;

document.addEventListener('touchstart', (e) => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
}, { passive: true });

document.addEventListener('touchmove', (e) => {
    const touch = e.touches[0];
    const diffX = Math.abs(touch.clientX - startX);
    const diffY = Math.abs(touch.clientY - startY);
    if (diffX > diffY) {

document.addEventListener('DOMContentLoaded', () => {
    const divider = document.getElementById('divider');
    const mapPane = document.getElementById('diachinh-map');
    const sidebarPane = document.getElementById('diachinh-sidebar');
    let isDragging = false, rafId = null, lastY = 0;

    if (window.innerWidth <= 768 && divider) {
        divider.addEventListener('pointerdown', (e) => {
            isDragging = true;
            lastY = e.clientY;
            e.preventDefault();
            document.addEventListener('pointermove', onPointerMove);
        });

        function onPointerMove(e) {
            if (!isDragging || Math.abs(e.clientY - lastY) < 3) return;
            lastY = e.clientY;
            if (rafId) cancelAnimationFrame(rafId);

            rafId = requestAnimationFrame(() => {
                let newMapHeight = (e.clientY / window.innerHeight) * 100;
                if (newMapHeight >= 6 && newMapHeight <= 88) {
                    mapPane.style.height = `${newMapHeight}%`;
                    sidebarPane.style.height = `${100 - newMapHeight}%`;
                }
            });
        }

        document.addEventListener('pointerup', () => {
            if (!isDragging) return;
            isDragging = false;
            document.removeEventListener('pointermove', onPointerMove);
            if (typeof map !== 'undefined' && map != null) map.invalidateSize({ pan: false });
        });
    }

    if (typeof initMap === 'function') initMap();
});

function updateStatus() {

    if (!el) return;

    const statusMap = {
        'idle': t('status_box.idle', 'Idle'),
        'drawing_polygon': t('status_box.drawing_polygon', 'Drawing Polygon...'),

        'saved': t('status_box.saved', 'Saved'),
        'modified': t('status_box.modified', 'Unsaved changes')
    };
    el.innerHTML = statusMap[appState] || appState;
}

function formatMeasurement(value, type = 'distance') {
    if (type === 'distance') {
        if (currentUnitSystem === 'metric') {
            return value >= 1000 ? (value / 1000).toFixed(2) + " km" : value.toFixed(2) + " m";
        }
        let feet = value * 3.28084;
        return feet >= 5280 ? (feet / 5280).toFixed(2) + " mi" : feet.toFixed(2) + " ft";
    }

    if (type === 'area') {
        if (currentUnitSystem === 'metric') {
            if (value >= 1000000) return `${(value / 1000000).toLocaleString('en-US', {maximumFractionDigits: 4})} km² (${value.toLocaleString('en-US', {maximumFractionDigits: 2})} m²)`;
            if (value >= 10000) return `${(value / 10000).toLocaleString('en-US', {maximumFractionDigits: 4})} ha (${value.toLocaleString('en-US', {maximumFractionDigits: 2})} m²)`;
            return `${value.toLocaleString('en-US', {maximumFractionDigits: 2})} m²`;
        }
        let sqft = value * 10.7639;
        if (sqft >= 43560) return `${(sqft / 43560).toLocaleString('en-US', {maximumFractionDigits: 4})} ac (${sqft.toLocaleString('en-US', {maximumFractionDigits: 2})} sq ft)`;
        return `${sqft.toLocaleString('en-US', {maximumFractionDigits: 2})} sq ft`;
    }
    return value;
}

function renderResults() {
    let areaDisp = document.getElementById("areaDisplay");
    let edgeTable = document.getElementById("edgeTable");

    if (areaDisp) {
        let areaM2 = currentShapeData.area;
        if (currentUnitSystem === 'metric') {
            areaDisp.innerHTML = `${(areaM2 / 1000000).toLocaleString(undefined, {minimumFractionDigits: 4, maximumFractionDigits: 4})} km²<br/><span style='font-size: 0.85em; color: #666;'>(${areaM2.toLocaleString('en-US', {maximumFractionDigits: 2})} m²)</span>`;
        } else {
            areaDisp.innerHTML = `${(areaM2 / 2589988.11).toLocaleString(undefined, {minimumFractionDigits: 4, maximumFractionDigits: 4})} sq mi<br/><span style='font-size: 0.85em; color: #666;'>(${areaM2.toLocaleString('en-US', {maximumFractionDigits: 2})} sq m)</span>`;
        }
    }

    if (edgeTable) {
        let tbody = edgeTable.querySelector('tbody') || edgeTable.appendChild(document.createElement('tbody'));
        let tableBody = "";
        let totalDistance = 0;
        const edges = currentShapeData.edges;
        const isPolygon = (typeof polyType !== 'undefined' && polyType == '1');

        edges.forEach((dist, i) => {
            totalDistance += dist;
            let dKetThuc = (i === edges.length - 1 && isPolygon) ? 1 : i + 2;
            tableBody += `<tr><td>${i + 1}-${dKetThuc}</td><td>${formatMeasurement(dist, 'distance')}</td></tr>`;
        });
        tableBody += `<tr style='font-weight: bold; background-color: #f8f9fa;'><td>${t('results.table_total', 'Total')}</td><td>${formatMeasurement(totalDistance, 'distance')}</td></tr>`;
        tbody.innerHTML = tableBody;
    }
}

const LocateControl = L.Control.extend({
    options: { position: 'topright' },
    onAdd: function (map) {
        let btn = L.DomUtil.create('button', 'leaflet-bar leaflet-control');
        btn.style.cssText = 'background-color:white; width:38px; height:38px; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center;';
        btn.title = t('map_controls.tooltip_my_location', 'My location');
        btn.setAttribute('data-i18n-title', 'map_controls.tooltip_my_location');
        btn.innerHTML = `<svg width="26" height="26" viewBox="2 2 20 20" fill="none" stroke="#555" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="pointer-events: none;"><circle cx="12" cy="12" r="3"></circle><path d="M12 2v3"></path><path d="M12 19v3"></path><path d="M2 12h3"></path><path d="M19 12h3"></path><circle cx="12" cy="12" r="7"></circle></svg>`;
        L.DomEvent.disableClickPropagation(btn);

        let myLocMarker = null, myLocCircle = null, isLocating = false;

        btn.onclick = function () {
            let svg = btn.querySelector('svg');
            if (!isLocating) {
                isLocating = true;
                map.locate({ setView: true, maxZoom: 17, watch: true });
                svg.style.stroke = "#aaa";
            } else {
                isLocating = false;
                map.stopLocate();
                if (myLocMarker) { map.removeLayer(myLocMarker); myLocMarker = null; }
                if (myLocCircle) { map.removeLayer(myLocCircle); myLocCircle = null; }
                svg.style.stroke = "#555";
                if (typeof processData === 'function') processData();
            }
        };

        map.on('locationfound', function (e) {
            if (!isLocating) return;
            let radius = Math.round(e.accuracy);
            if (myLocMarker) map.removeLayer(myLocMarker);
            if (myLocCircle) map.removeLayer(myLocCircle);

            myLocMarker = L.circleMarker(e.latlng, { radius: 7, fillColor: "#4285F4", color: "#ffffff", weight: 3, opacity: 1, fillOpacity: 1 }).addTo(map);
            myLocCircle = L.circle(e.latlng, { radius: radius, color: '#4285F4', fillColor: '#4285F4', fillOpacity: 0.15, weight: 1 }).addTo(map);

            let displayRadius = radius, unitLabel = "m";
            if (currentUnitSystem === 'imperial') {
                displayRadius = (radius * 3.28084).toFixed(1);
                unitLabel = "ft";
            }
            myLocMarker.bindPopup(`${t('map_controls.you_are_here', 'You are here!')}<br>${t('map_controls.accuracy', 'Accuracy:')} <b>${displayRadius} ${unitLabel}</b>`).openPopup();
            btn.querySelector('svg').style.stroke = "#4285F4";
        });

        map.on('locationerror', function (e) {
            if (!isLocating) return;
            isLocating = false;
            map.stopLocate();
            if (typeof processData === 'function') processData();
            alert(t('map_controls.alert_loc_error', 'Location access denied. ') + e.message);
            btn.querySelector('svg').style.stroke = "#e74c3c";
            setTimeout(() => {
                if (!isLocating) btn.querySelector('svg').style.stroke = "#555";
            }, 2000);
        });
        return btn;
    }
});

                    mapDiv.style.flexGrow = '1';
                }
            }
            setTimeout(() => { if (map) map.invalidateSize(); }, 200);
        }

        function updateMapScale(isMetric) {
            if (window.currentScaleControl) map.removeControl(window.currentScaleControl);
            document.querySelectorAll('.leaflet-control-scale').forEach(s => s.remove());

            window.currentScaleControl = L.control.scale({ metric: isMetric, imperial: !isMetric, position: 'bottomleft' }).addTo(map);
            let scaleEl = window.currentScaleControl.getContainer();
            let cornerLeft = map._controlCorners.bottomleft;

            if (scaleEl && cornerLeft) {
                cornerLeft.appendChild(scaleEl);
                scaleEl.style.cssText += 'margin-left:11px; margin-bottom:15px;';
            }
        }

        setTimeout(() => {
            if (!savedSidebar) applySidebarState(false);
            updateMapScale(savedUnit === 'metric');
            if (typeof renderResults === 'function') renderResults();
        }, 100);

        L.DomEvent.on(btn, 'click', (e) => {
            L.DomEvent.stop(e);
            popup.style.display = popup.style.display === 'none' ? 'block' : 'none';
        });

        map.on('click', () => { popup.style.display = 'none'; });

        setTimeout(() => {
            container.querySelector('#toggleSidebarUI').addEventListener('change', function() {
                applySidebarState(this.checked);
                localStorage.setItem('cfg_sidebar', this.checked);
            });

            container.querySelector('#toggleUnitUI').addEventListener('change', function() {
                let isMetric = this.checked;
                currentUnitSystem = isMetric ? 'metric' : 'imperial';
                let label = document.getElementById('unitLabelText');

                label.setAttribute('data-i18n', isMetric ? 'settings.unit_metric' : 'settings.unit_imperial');
                label.innerText = isMetric ? t('settings.unit_metric', 'Metric (m/ha)') : t('settings.unit_imperial', 'Imperial (ft/ac)');
                localStorage.setItem('cfg_unit', currentUnitSystem);

                let header = document.getElementById('lengthHeader');
                if (header) header.innerHTML = `<span data-i18n='results.table_length'>${t('results.table_length', 'Length')}</span> (${isMetric ? "m" : "ft"})`;

                updateMapScale(isMetric);
                if (typeof renderResults === 'function') renderResults();
            });

            container.querySelector('#languageSelectUI').addEventListener('change', function() {
                localStorage.setItem('user_lang', this.value);
                if (typeof loadLanguageData === 'function') loadLanguageData(this.value);
                if (typeof appState !== 'undefined' && typeof updateStatus === 'function') {
                    setTimeout(() => updateStatus(appState), 300);
                }
            });
        }, 0);

        return container;
    }
});

function initMap() {

        preferCanvas: true,

        fadeAnimation: true,
        markerZoomAnimation: true,

    }).setView([51.4779, -0.0015], 10);

    googleStreets = L.tileLayer('https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
        maxZoom: 22,
        subdomains: ['mt0', 'mt1', 'mt2', 'mt3'],
        noWrap: false
    });

    googleSatellite = L.tileLayer('https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
        maxZoom: 22,
        subdomains: ['mt0', 'mt1', 'mt2', 'mt3'],
        noWrap: false
    });

    googleHybrid = L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
        maxZoom: 22,
        subdomains: ['mt0', 'mt1', 'mt2', 'mt3'],
        noWrap: false
    });

    googleHybrid.addTo(map);

    map.addControl(new L.Control.DrawBtn());

    map.addControl(new L.Control.SnapshotControl());
    if (typeof LocateControl !== 'undefined') map.addControl(new LocateControl());
    map.addControl(new L.Control.SettingsControl());

    let currentSearchMarker = null;

    if (typeof L.Control.Geocoder === 'function' || typeof L.Control.geocoder === 'function') {
        window.myGeocoderControl = L.Control.geocoder({
            position: 'topright',
            placeholder: t('geocoder.placeholder', 'Address / WGS84 coords...'),
            errorMessage: t('geocoder.error', 'Location not found.'),
            defaultMarkGeocode: false
        })
        .on('markgeocode', function(e) {
            let latlng = e.geocode.center;
            if (currentSearchMarker) map.removeLayer(currentSearchMarker);

            let txtResult = t('geocoder.result', 'Search Result');
            currentSearchMarker = L.marker(latlng).addTo(map).bindPopup(`<b>📍 ${txtResult}:</b><br>${e.geocode.name}`).openPopup();

            console.log("📍 Geocoder returned raw address:", e.geocode.name || "");
            setTimeout(() => map.setView(latlng, 16), 500);
        }).addTo(map);
    } else {
        console.warn("Leaflet Control Geocoder library not loaded!");
    }

    pointLabelsLayer = L.layerGroup().addTo(map);

    map.on('click', function(e) {
        if (isDrawingMode || isLineMode) {
            let clickedLng = e.latlng.lng;
            let wrappedLatLng = e.latlng.wrap();
            if (clickedLng < -180 || clickedLng > 180) {
                map.setView(map.getCenter().wrap(), map.getZoom(), { animate: false });
            }
            taoDiemMoi(wrappedLatLng);
        }
    });

    if (typeof loadFromURL === 'function') loadFromURL();
}

function taoDiemMoi(latlng) {
    let soThuTu = drawnMarkers.length + 1;
    let isMobile = window.innerWidth <= 768;
    let size = isMobile ? 26 : 22;
    let fontSize = isMobile ? 14 : 12;

    let iconSoThuTu = L.divIcon({
        className: 'custom-div-icon',
        html: `<div style='background-color:rgba(0,0,0,0.35); color:white; width:${size}px; height:${size}px; border-radius:50%; border:2px solid white; box-sizing: border-box; box-shadow: 0 0 5px rgba(0,0,0,0.5); display:flex; align-items:center; justify-content:center; font-size:${fontSize}px; font-weight:bold;'>${soThuTu}</div>`,
        iconSize: [size, size],
        iconAnchor: [size / 2, size / 2]
    });

    let marker = L.marker(latlng, { icon: iconSoThuTu, draggable: true }).addTo(map);
    drawnMarkers.push(marker);

    marker.on('drag', () => {
        if (interactivePolySelect) interactivePolySelect.setLatLngs(drawnMarkers.map(m => m.getLatLng()));
    });

    marker.on('dragend', () => capNhatHinhVaToaDo());

    capNhatHinhVaToaDo();
    document.querySelector(".result-box").style.display = (polyType == 1) ? "block" : "none";
    window.laDiemDauTien = false;
}

function capNhatHinhVaToaDo() {
    let danhSachWGS84_Leaflet = [];
    wgs84Coords = [];
    let chuoiKetQuaWgs84 = "";

    drawnMarkers.forEach((marker, index) => {
        let pos = marker.getLatLng().wrap();
        danhSachWGS84_Leaflet.push(pos);
        wgs84Coords.push([pos.lat, pos.lng]);

        let prefix = (index === 0 && window.laDiemDauTien) ? "" : "\n";
        chuoiKetQuaWgs84 += `${prefix}${pos.lat.toFixed(6)} ${pos.lng.toFixed(6)}`;
    });

    if (interactivePolySelect) interactivePolySelect.setLatLngs(danhSachWGS84_Leaflet);

    document.getElementById('coordsInput').value = chuoiKetQuaWgs84.trim();
    if (typeof window.capNhatSoDong === "function") window.capNhatSoDong();

    if (wgs84Coords.length >= 2) {
        if (typeof calculateMetrics === 'function') calculateMetrics(wgs84Coords);
        document.getElementById("results").style.display = "block";
        document.getElementById("sidebar").style.display = "none";

        let helpLinkBtn = document.getElementById("btnHelpLink");
        if (helpLinkBtn) helpLinkBtn.style.display = "none";

        if (danhSachWGS84_Leaflet.length >= 3 && typeof turf !== 'undefined') {
            try {
                let turfCoords = wgs84Coords.map(p => [p[0], p[1]]);
                if (turfCoords[0][0] !== turfCoords[turfCoords.length - 1][0] || turfCoords[0][1] !== turfCoords[turfCoords.length - 1][1]) {
                    turfCoords.push([turfCoords[0][0], turfCoords[0][1]]);
                }
                wgs84Coords = turfCoords;
                let tamChuan = turf.pointOnFeature(turf.polygon([turfCoords]));
                centerLat = tamChuan.geometry.coordinates[1];
                centerLng = tamChuan.geometry.coordinates[0];
            } catch (error) {
                console.warn("Lỗi Turf:", error);
                let bounds = interactivePolySelect.getBounds();
                centerLat = bounds.getCenter().lat;
                centerLng = bounds.getCenter().lng;
            }
        } else if (interactivePolySelect) {
            let bounds = interactivePolySelect.getBounds();
            centerLat = bounds.getCenter().lat;
            centerLng = bounds.getCenter().lng;
        }
    } else {
        document.getElementById("results").style.display = "none";
        let btnGMap = document.getElementById("btnGoogleMap");
        let btnHelp = document.getElementById("btnHelpLink");
        if (btnGMap) btnGMap.style.display = "none";
        if (btnHelp) btnHelp.style.display = "none";
    }
}

function resetUI() {
    isDrawingMode = false;
    isLineMode = false;

    let drawBtn = document.getElementById("toggleDrawBtn");
    let lineBtn = document.getElementById("toggleLineBtn");
    if (drawBtn) {

// VẼ TỪ TEXTAREA NHẬP VÀO
function processData() {
    if (typeof resetUI === "function") resetUI();

    let rawText = document.getElementById("coordsInput").value.trim();
    if (rawText === "") {
        appState = "idle";
        updateStatus();
        alert(translations.alerts.no_coordinates);
        return;
    }

    const lines = rawText.split("\n");
    let isWGS84 = null;
    const parsedNumbers = [];

    // ===================================================================
    // BƯỚC 1: ĐỌC DỮ LIỆU VÀ NHẬN DIỆN HỆ TỌA ĐỘ
    // ===================================================================
    lines.forEach(line => {
        let cleanLine = line.replace(/,/g, '.');
        let numbers = cleanLine.match(/-?\d+(\.\d+)?/g);
        if (numbers && numbers.length >= 2) {
            let n1 = parseFloat(numbers[0]);
            let n2 = parseFloat(numbers[1]);

            if (isWGS84 === null) {
                isWGS84 = true;
            }
            parsedNumbers.push({ n1, n2, originalNumbers: numbers });
        }
    });

    if (parsedNumbers.length < 2 && polyType == 2) {
        alert(translations.alerts.need_2_points);
        appState = "idle";
        updateStatus();
        return;
    } else if (parsedNumbers.length < 3 && polyType == 1) {
        alert(translations.alerts.need_3_points);
        appState = "idle";
        updateStatus();
        return;
    }

    wgs84Coords = [];
    let chuoiChuanHoa = "";

    function chuanHoa(str) {
        if (!str) return "";
        return str.toLowerCase()
            .normalize('NFD')
            .replace(/[\u0300-\u036f]/g, '')
            .replace(/đ/g, 'd')
            .replace(/(tinh |thanh pho |tp\.|tp )/g, '')
            .replace(/[^a-z0-9]/g, '')
            .trim();
    }

    // ===================================================================
    // BƯỚC 2: RẼ NHÁNH XỬ LÝ THEO TỪNG HỆ TỌA ĐỘ
    // ===================================================================
    if (isWGS84) {
        parsedNumbers.forEach(p => {
            let lat = p.n1, lng = p.n2;
            let c3 = (p.originalNumbers.length > 2) ? parseFloat(p.originalNumbers[2]) : undefined;

            if (Math.abs(lat) > 90) {
                lat = p.n2;
                lng = p.n1;
            }

            if (c3 !== undefined && !isNaN(c3)) {
                wgs84Coords.push([lat, lng, c3]);
                chuoiChuanHoa += lat.toFixed(6) + ", " + lng.toFixed(6) + ", " + c3 + "\n";
            } else {
                wgs84Coords.push([lat, lng]);
                chuoiChuanHoa += lat.toFixed(6) + ", " + lng.toFixed(6) + "\n";
            }
        });
    }

    // ===================================================================
    // BƯỚC 3: QUÉT VÙNG CẤM (Khu vực quân sự, nhạy cảm...)
    // ===================================================================
    try {
        let turfCoords = wgs84Coords.map(p => [p[1], p[0]]);

        if (wgs84Coords.length >= 3 && polyType !== 2) {
            if (turfCoords[0][0] !== turfCoords[turfCoords.length - 1][0] ||
                turfCoords[0][1] !== turfCoords[turfCoords.length - 1][1]) {
                turfCoords.push([turfCoords[0][0], turfCoords[0][1]]);
            }

            const polygonGeoJSON = turf.polygon([turfCoords]);
            const dienTichM2 = turf.area(polygonGeoJSON);
            const DIEN_TICH_1_KM2 = 1000000;

            if (dienTichM2 < DIEN_TICH_1_KM2) {
                const centerPoint = turf.centroid(polygonGeoJSON);
                const diemCamGoogleMaps = [
                    [21.03707723479608, 105.83753872596262],
                    [21.03927106127961, 105.8346196138419],
                    [21.03678262906504, 105.83467078480963],
                    [21.006421865289752, 105.78702741634761],
                    [21.03381702880609, 105.8429280408007],
                    [21.04831405325766, 105.77919012974833]
                ];

                const danhSachCam = diemCamGoogleMaps.map(p => turf.point([p[1], p[0]]));
                const KHOANG_CACH_AN_TOAN = 100;

                for (let diemCam of danhSachCam) {
                    if (turf.booleanPointInPolygon(diemCam, polygonGeoJSON)) {
                        alert(translations.alerts.restricted_overlap);
                        resetUI();
                        return;
                    }
                    const khoangCach = turf.distance(centerPoint, diemCam, { units: 'meters' });
                    if (khoangCach < KHOANG_CACH_AN_TOAN) {
                        alert(translations.alerts.restricted_close.replace('{distance}', Math.round(khoangCach)));
                        resetUI();
                        return;
                    }
                }
            }
        } else {
            console.log("Đang vẽ Line, bỏ qua tính toán Polygon của Turf.");
        }
    } catch (error) {
        console.error("Lỗi khi xử lý Turf.js:", error);
    }

    // ===================================================================
    // BƯỚC 4: HIỂN THỊ LÊN BẢN ĐỒ VÀ GIAO DIỆN
    // ===================================================================
    let coordsInput = document.getElementById("coordsInput");
    if (coordsInput) coordsInput.value = chuoiChuanHoa.trim();
    if (typeof capNhatSoDong === "function") capNhatSoDong();

    if (typeof calculateMetrics === "function") calculateMetrics(wgs84Coords);
    if (typeof drawOnMap === "function") drawOnMap(wgs84Coords);

    let resDiv = document.getElementById("results");
    if (resDiv) resDiv.style.display = "block";
    appState = "done";
    updateStatus();

    let btnHelp = document.getElementById("btnHelpLink");
    if (btnHelp) btnHelp.style.display = "none";

    if (polyType == 1) {
        document.querySelector(".result-box").style.display = "block";
    } else {
        document.querySelector(".result-box").style.display = "none";
    }
}

function calculateMetrics(points) {
    if (!points || points.length === 0) return;

    currentShapeData.edges = [];
    currentShapeData.area = 0;

    const isPolygon = (typeof polyType !== 'undefined' && polyType == '1');
    const totalEdges = isPolygon ? points.length : points.length - 1;

    for (let i = 0; i < totalEdges; i++) {
        let p1 = points[i];
        let p2 = points[(i + 1) % points.length];

        let pt1 = turf.point([p1[1], p1[0]]);
        let pt2 = turf.point([p2[1], p2[0]]);

        let dist = turf.distance(pt1, pt2, { units: 'meters' });
        currentShapeData.edges.push(dist);
    }

    if (isPolygon && points.length >= 3) {
        let coordinates = points.map(p => [p[1], p[0]]);
        coordinates.push([points[0][1], points[0][0]]);

        try {
            let polygon = turf.polygon([coordinates]);
            currentShapeData.area = turf.area(polygon);
        } catch (error) {
            console.error("Lỗi khi tính diện tích Turf.js: ", error);
        }
    }

    renderResults();

    let coordsEl = document.getElementById("coordsInput");
    const shareObj = {
        t: typeof polyType !== 'undefined' ? polyType : 'polygon',
        c: coordsEl ? coordsEl.value : ""
    };

    if (shareObj.c.trim() !== "") {
        const encodedData = btoa(unescape(encodeURIComponent(JSON.stringify(shareObj))));
        window.history.replaceState(null, null, window.location.pathname + "#data=" + encodedData);
    } else {
        window.history.replaceState(null, null, window.location.pathname);
    }
}

function drawOnMap(coords) {
    let dragMarker = null;
    let lastPos = null;
    let activeCoords = coords.map(c => [...c]);

    if (currentPolySelect) map.removeLayer(currentPolySelect);

    if (polyType == 2) {
        currentPolySelect = L.polyline(activeCoords, {
            color: '#00FFFF',
            weight: 3,
            fillColor: '#00FFFF',
            fillOpacity: 0.2,
            cursor: 'crosshair'
        }).addTo(map);
    } else {
        currentPolySelect = L.polygon(activeCoords, {
            color: '#00FFFF',
            weight: 3,
            fillColor: '#00FFFF',
            fillOpacity: 0.2,
            cursor: 'crosshair'
        }).addTo(map);
    }

    currentPolySelect.off('click');

    currentPolySelect.on('click', function(e) {
        L.DomEvent.stopPropagation(e);

        const pointClick = e.latlng;

        let insertIndex = 0;
        let minDistance = Infinity;
        for (let i = 0; i < activeCoords.length; i++) {
            let p1 = L.latLng(activeCoords[i]);
            let p2 = L.latLng(activeCoords[(i + 1) % activeCoords.length]);
            let dist = L.LineUtil.pointToSegmentDistance(
                map.latLngToLayerPoint(pointClick),
                map.latLngToLayerPoint(p1),
                map.latLngToLayerPoint(p2)
            );
            if (dist < minDistance) {
                minDistance = dist;
                insertIndex = i + 1;
            }
        }
        activeCoords.splice(insertIndex, 0, [pointClick.lat, pointClick.lng]);
        refreshUIAndData();
    });

    function refreshUIAndData() {
        if (pointLabelsLayer) pointLabelsLayer.clearLayers();
        currentPolySelect.setLatLngs(activeCoords);
        syncWithInput();
    }

    function updateCenterAndButton(coords) {
        let bounds = L.latLngBounds(coords);
        let center = bounds.getCenter();

        centerLat = center.lat;
        centerLng = center.lng;

        if (coords.length >= 2) {
            document.getElementById("btnGoogleMap").style.display = "block";
        }
    }

    function renderMarkers() {
        if (typeof pointLabelsLayer !== 'undefined' && pointLabelsLayer) {
            pointLabelsLayer.clearLayers();
        }

        const isTrans = typeof translations !== 'undefined';
        const txt = {
            gmaps: (isTrans && translations.general?.lbl_gmaps) || 'Google Maps',
            remove: (isTrans && translations.general?.btn_remove) || 'Remove',
            addAuto: (isTrans && translations.general?.btn_add_point_auto) || 'Add point (Auto)',
            need3: (isTrans && translations.alerts?.need_3_points) || 'At least 3 points are required!',
            hide: (isTrans && translations.general?.btn_hide_circle) || 'Hide circle',
            show: (isTrans && translations.general?.btn_show_circle) || 'Show circle',
            showAll: (isTrans && translations.general?.btn_show_all) || 'Show all circles',
            hideAll: (isTrans && translations.general?.btn_hide_all) || 'Hide all circles',
            invalidWGS: (isTrans && translations.alerts?.no_coordinates) || "Invalid WGS84 coordinates!",
            navTitle: (isTrans && translations.general?.lbl_nav_title) || 'Node Navigator',
            placeholderWGS: (isTrans && translations.general?.lbl_placeholder_wgs) || 'WGS84 (Lat, Lng)...'
        };

        activeCoords.forEach((c, index) => {
            const isHidden = (c[2] === 0);
            const isFirst = (index === 0);
            const isLast = (index === activeCoords.length - 1);

            if (isHidden && !isFirst && !isLast) return;

            let defaultBorder = '#fff';
            if (isFirst) defaultBorder = '#00E676';
            if (isLast) defaultBorder = '#FF1744';

            const numStr = (index + 1).toString();

    }

    function createPopupButton(label, color, svgPath, isBold = false, borderTop = "none") {
        const btn = document.createElement('button');
        btn.style.cssText = `display: flex; align-items: center; gap: 8px; padding: 7px 10px; background: #fff; color: ${color}; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: ${isBold ? 'bold' : 'normal'}; border-top: ${borderTop}; transition: background 0.2s;`;
        btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">${svgPath}</svg> <span>${label}</span>`;
        btn.onmouseover = () => btn.style.background = "#F9FAFB";
        btn.onmouseout = () => btn.style.background = "#fff";
        return btn;
    }

    if (typeof map !== 'undefined') {
        map.on('popupclose', () => {
            if (typeof pointLabelsLayer === 'undefined') return;
            pointLabelsLayer.getLayers().forEach((m) => {
                if (!m._icon?.firstChild) return;
                const div = m._icon.firstChild;
                const idx = m.options.markerIndex;
                let border = (idx === 0) ? '#00E676' : (idx === activeCoords.length - 1 ? '#FF1744' : '#fff');
                div.style.borderColor = border;
                div.style.boxShadow = "0 2px 4px rgba(0,0,0,0.4)";
                div.style.zIndex = "1000";
            });
        });
    }

    function renderCenterTarget() {
        if (!activeCoords || activeCoords.length === 0) return;

        let center = getPolygonCenter(activeCoords);

        let dx = 0;
        let dy = 0;

        let zoom = (typeof map !== 'undefined' && typeof map.getZoom === 'function') ? map.getZoom() : 18;
        if (zoom === 0 || isNaN(zoom)) zoom = 18;

        let centerPt = map.project(L.latLng(center), zoom);
        let nodePts = activeCoords.map(c => map.project(L.latLng(c), zoom));

        const KHOANG_CACH_AN_TOAN = 28;

        function checkPixelOverlap(testDx, testDy) {
            let testX = centerPt.x + testDx;
            let testY = centerPt.y + testDy;
            return nodePts.some(pt => {
                let dist = Math.sqrt(Math.pow(pt.x - testX, 2) + Math.pow(pt.y - testY, 2));
                return dist < KHOANG_CACH_AN_TOAN;
            });
        }

        if (checkPixelOverlap(0, 0)) {
            let angle = 0;
            let radius = KHOANG_CACH_AN_TOAN;
            let maxAttempts = 50;
            let attempts = 0;

            while (attempts < maxAttempts) {
                let rad = angle * Math.PI / 180;
                let testDx = radius * Math.cos(rad);
                let testDy = radius * Math.sin(rad);

                if (!checkPixelOverlap(testDx, testDy)) {
                    dx = testDx;
                    dy = testDy;
                    break;
                }

                angle += 30;
                attempts++;

                if (angle >= 360) {
                    angle = 0;
                    radius += 14;
                }
            }
        }

        const dragIcon = L.divIcon({
            className: 'drag-handle',
            html: `<div style="font-size: 28px; cursor: move; text-shadow: 0 0 5px #000;">🎯</div>`,
            iconSize: [28, 28],
            iconAnchor: [14 - dx, 14 - dy]
        });

        let dragMarker = L.marker(center, {
            icon: dragIcon,
            draggable: true,
            zIndexOffset: 2000
        }).addTo(pointLabelsLayer);

        let lastPos = dragMarker.getLatLng();
        let dragRafId = null;

        dragMarker.on('dragstart', function(e) {
            lastPos = e.target.getLatLng();
            pointLabelsLayer.eachLayer(layer => {
                if (layer !== dragMarker && typeof layer.setOpacity === 'function') layer.setOpacity(0);
            });
        });

        dragMarker.on('drag', function(e) {
            if (dragRafId) cancelAnimationFrame(dragRafId);

            dragRafId = requestAnimationFrame(() => {
                let currentPos = e.latlng;
                let latDiff = currentPos.lat - lastPos.lat;
                let lngDiff = currentPos.lng - lastPos.lng;

                activeCoords = activeCoords.map(c => {
                    let newPoint = [c[0] + latDiff, c[1] + lngDiff];
                    if (c.length > 2) newPoint.push(c[2]);
                    return newPoint;
                });

                if (currentPolySelect) currentPolySelect.setLatLngs(activeCoords);
                lastPos = currentPos;
            });
        });

        dragMarker.on('dragend', function(e) {
            let i = 0;
            pointLabelsLayer.eachLayer(layer => {
                if (layer !== dragMarker && i < activeCoords.length) {
                    layer.setLatLng(activeCoords[i]);
                    if (typeof layer.setOpacity === 'function') layer.setOpacity(1);
                    i++;
                }
            });
            if (typeof syncWithInput === 'function') syncWithInput();
        });
    }

    function syncWithInput() {
        let txtWgs84 = "";
        wgs84Coords = [];

        activeCoords.forEach(coord => {
            if (coord.length > 2 && coord[2] !== undefined) {
                wgs84Coords.push([coord[0], coord[1], coord[2]]);
                txtWgs84 += coord[0].toFixed(6) + " " + coord[1].toFixed(6) + " " + coord[2] + "\n";
            } else {
                wgs84Coords.push([coord[0], coord[1]]);
                txtWgs84 += coord[0].toFixed(6) + " " + coord[1].toFixed(6) + "\n";
            }
        });

        document.getElementById('coordsInput').value = txtWgs84.trim();
        if (typeof calculateMetrics === "function") calculateMetrics(wgs84Coords);

        renderMarkers();
        appState = "modified";
        updateStatus();
    }

    function getPolygonCenter(latlngs) {
        try {
            let turfCoords = latlngs.map(c => [c[1], c[0]]);
            if (turfCoords[0][0] !== turfCoords[turfCoords.length - 1][0]) turfCoords.push(turfCoords[0]);
            let tam = turf.pointOnFeature(turf.polygon([turfCoords]));
            return [tam.geometry.coordinates[1], tam.geometry.coordinates[0]];
        } catch (e) {
            return L.polygon(latlngs).getBounds().getCenter();
        }
    }

    renderMarkers();
    refreshUIAndData();
    if (currentPolySelect) {
        map.fitBounds(currentPolySelect.getBounds(), {padding: [50, 50], maxZoom: 20});
    }
}

let shortCode = "";

const formatPolygonToText = (polygonArray) => {
    if (!Array.isArray(polygonArray)) return "";
    return polygonArray.map(([lng, lat, z]) => {
        return z !== undefined ? `${lat}, ${lng}, ${z}` : `${lat}, ${lng}`;
    }).join('\n');
};

const applyMapData = (coordsText, type, delay = 300) => {
    const input = document.getElementById("coordsInput");
    if (input) input.value = coordsText;

    if (typeof polyType !== 'undefined') polyType = parseInt(type);
    if (typeof processData === 'function') setTimeout(processData, delay);
};

/**
 * Hàm tạo Description dựa trên loại bản đồ và địa danh
 */
function generateDescription(data) {
    const { title, area, t } = data;
    const areaStr = area ? `in ${area}` : "";
    
    // Fallback nếu title trống để câu văn tự nhiên hơn
    const titleStr = title || (t == 1 ? "this area" : "this route");

    return t == 1 
        ? `Explore ${titleStr} ${areaStr} on QuickMapShare. View precise coordinate data.`
        : `Track the route '${titleStr}' ${areaStr} via QuickMapShare.`;
}

/**
 * Hàm helper giúp cập nhật hoặc tạo mới thẻ meta
 */
function updateMeta(selector, attrName, attrValue, content) {
    let meta = document.querySelector(selector);
    if (!meta) {
        meta = document.createElement('meta');
        meta.setAttribute(attrName, attrValue);
        document.head.appendChild(meta);
    }
    meta.content = content;
}

/**
 * Cập nhật SEO động (Title & Description & Thumbnail)
 */
function updateSEO(data, code) {
	console.log("Data truyền vào updateSEO:", data);
    if (!data) return;
    
    const { title, area, t, thumb } = data; 
    const label = (t === 1) ? "Area" : "Route";
    const displayTitle = title || (area ? `${label} in ${area}` : `Interactive ${label}`);
    const descriptionText = generateDescription(data);

    // 1. Cập nhật Title 
    document.title = displayTitle + " | QuickMapShare";
    
    // Cập nhật Meta Description, og:title, og:description
    updateMeta('meta[name="description"]', 'name', 'description', descriptionText);
    updateMeta('meta[property="og:title"]', 'property', 'og:title', displayTitle);
    updateMeta('meta[property="og:description"]', 'property', 'og:description', descriptionText);

    // 2. CẬP NHẬT ẢNH THUMBNAIL
    if (thumb) {
        // Cập nhật og:image và twitter:image
        updateMeta('meta[property="og:image"]', 'property', 'og:image', thumb);
        updateMeta('meta[name="twitter:image"]', 'name', 'twitter:image', thumb);

        // Cập nhật thẻ link rel='image_src'
        let imageSrcTag = document.querySelector('link[rel="image_src"]');
        if (imageSrcTag) {
            imageSrcTag.href = thumb;
        } else {
            imageSrcTag = document.createElement('link');
            imageSrcTag.rel = 'image_src';
            imageSrcTag.href = thumb;
            document.head.appendChild(imageSrcTag);
        }
    }

    // 3. Cập nhật Canonical (Rất quan trọng cho Google Index ?s=)
    let canonical = document.querySelector('link[rel="canonical"]');
    if (!canonical) {
        canonical = document.createElement('link');
        canonical.rel = 'canonical';
        document.head.appendChild(canonical);
    }
    canonical.href = `https://www.quickmapshare.com/?s=${code}`;
} 

/**
 * Hàm lấy dữ liệu Map chính
 */
async function getMapData(code) {
    const cacheKey = `offlineMap_${code}`;
    const cached = localStorage.getItem(cacheKey);

    if (cached) {
        try {
            const data = JSON.parse(cached);
            updateSEO(data, code); // Chạy SEO ngay từ cache
            applyMapData(formatPolygonToText(data.wgs84_polygon), data.t);
            return; 
        } catch (e) { console.error("Cache lỗi:", e); }
    }

    try {
        const res = await fetch(`https://api.quickmapshare.com/api/get-map-data/${code}`);
        const result = await res.json();

        if (result.success && result.data) {
            // FIX: Đã thêm trường `thumb` vào đây để lấy được ảnh từ API
            const { wgs84_polygon, t, title, area, thumb } = result.data;
            
            // FIX: Đưa `thumb` vào dataToSave để dùng cho SEO và Cache
            const dataToSave = { wgs84_polygon, t, title, area, thumb };

            updateSEO(dataToSave, code); 
            applyMapData(formatPolygonToText(wgs84_polygon), t);
            
            // Lưu vào LocalStorage có cả ảnh luôn
            localStorage.setItem(cacheKey, JSON.stringify(dataToSave));
        }
    } catch (e) { console.error("Lỗi fetch API:", e); }
}

async function loadFromURL() {
    const urlParams = new URLSearchParams(window.location.search);
    const hash = window.location.hash;
    const code = urlParams.get("s");
    const dataString = urlParams.get("data") || (hash.startsWith("#data=") ? hash.replace("#data=", "") : null);

    if (code) {
        if (typeof shortCode !== 'undefined') shortCode = code;
        await getMapData(code);
        return;
    }

    if (dataString) {
        try {
            const decoded = JSON.parse(decodeURIComponent(escape(atob(dataString))));
            applyMapData(decoded.c, decoded.t, 500);
        } catch (e) { console.error("Lỗi giải mã Base64:", e); }
    }
}

async function taoLinkChiaSe() {
    if (typeof wgs84Coords === 'undefined' || !Array.isArray(wgs84Coords) || wgs84Coords.length === 0) {
        alert(t('alerts.no_coordinates', 'Vui lòng xem ranh đất trên bản đồ trước khi tạo link!'));
        if (typeof appState !== 'undefined') appState = "idle";
        if (typeof updateStatus === "function") updateStatus();
        return;
    }

    let mapboxPolygon = wgs84Coords.map(diem => {
        let point = [diem[1], diem[0]];
        if (diem.length > 2) point.push(diem[2]);
        return point;
    });

    const safePolyType = typeof polyType !== 'undefined' ? polyType : 1;
    const currentUser = (typeof firebase !== 'undefined' && firebase.auth) ? firebase.auth().currentUser : null;
    const userIdentifier = currentUser ? currentUser.uid : 'guest';

    const hashCode = (s) => s.split('').reduce((a, b) => { a = ((a << 5) - a) + b.charCodeAt(0); return a & a }, 0);
    const arrayString = JSON.stringify(mapboxPolygon);
    const uniqueKey = `map_${userIdentifier}_${safePolyType}_${hashCode(arrayString)}`;

    const cachedLink = localStorage.getItem(uniqueKey);
    if (cachedLink) {
        const inputLink = document.getElementById('linkDaTao');
        if (inputLink) inputLink.value = cachedLink;
        if (typeof appState !== 'undefined') appState = "saved";
        if (typeof updateStatus === "function") updateStatus();
        return;
    }

    let idToken = null;
    if (currentUser) {
        try { idToken = await currentUser.getIdToken(); }
        catch (e) { console.error("Lấy token thất bại", e); }
    }

    const requestHeaders = { 'Content-Type': 'application/json' };
    if (idToken) requestHeaders['Authorization'] = `Bearer ${idToken}`;

    const titleInput = document.getElementById('tenBanDo');
    const mapTitle = (titleInput && titleInput.value.trim() !== "") ? titleInput.value.trim() : null;

    try {
        const response = await fetch('https://api.quickmapshare.com/api/luu-ban-do', {
            method: 'POST',
            headers: requestHeaders,
            body: JSON.stringify({
                province: "WGS84",
                meridian: "0",
                polyType: safePolyType,
                wgs84_polygon: mapboxPolygon,
                origin: window.location.origin,
                language: typeof currentLang !== 'undefined' ? currentLang : 'en',
                title: mapTitle
            })
        });

        const data = await response.json();

        if (data.success) {
            const apiDomain = "https://api.quickmapshare.com";
            const fullShareLink = `${apiDomain}/share/${data.url}`;

            const inputLink = document.getElementById('linkDaTao');
            if (inputLink) inputLink.value = fullShareLink;

            localStorage.setItem(uniqueKey, fullShareLink);
            localStorage.setItem(`dict_${data.url}`, uniqueKey);

            const mapDataToCache = { wgs84_polygon: mapboxPolygon, t: safePolyType };
            localStorage.setItem(`offlineMap_${data.url}`, JSON.stringify(mapDataToCache));

            if (typeof appState !== 'undefined') appState = "saved";
            if (typeof updateStatus === "function") updateStatus();

            if (idToken && typeof loadMyMaps === 'function') {
                setTimeout(() => loadMyMaps(idToken), 500);
            }
        } else {
            alert(t('alerts.error', 'Lỗi: ') + data.error);
        }
    } catch (error) {
        console.error("Lỗi gọi API lưu bản đồ:", error);
        alert(t('alerts.api_error', 'Không thể kết nối máy chủ! Vui lòng thử lại.'));
    }
}

function getTranslation(keyPath) {
    return keyPath.split('.').reduce((obj, key) => (obj && obj[key] !== undefined ? obj[key] : null), translations);
}

// ==========================================
// HÀM TẢI DỮ LIỆU JSON TỪ GITHUB
// ==========================================
function loadLanguageData(lang) {
    const cacheBuster = new Date().getTime();
    const cdnUrl = `https://raw.githubusercontent.com/quickmapshare/map-locales/main/${lang}.json?v=${cacheBuster}`;

    fetch(cdnUrl)
        .then(response => {
            if (!response.ok) throw new Error(`Không tìm thấy file ngôn ngữ: ${lang}.json`);
            return response.json();
        })
        .then(data => {
            translations = data;
            currentLang = lang;
            localStorage.setItem('user_lang', currentLang);
            applyTranslations();
        })
        .catch(error => {
            console.warn(error);
            if (lang !== 'en') {
                console.log("Đang chuyển về ngôn ngữ mặc định (Tiếng Anh)...");
                loadLanguageData('en');
            }
        });
}

// ==========================================
// HÀM CẬP NHẬT GIAO DIỆN HTML (ĐA NGÔN NGỮ)
// ==========================================
function applyTranslations() {
    document.querySelectorAll('[data-i18n]').forEach(el => {
        const textValue = getTranslation(el.getAttribute('data-i18n'));
        if (textValue) {
            if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
                el.placeholder = textValue;
            } else {
                el.innerHTML = textValue;
            }
        }
    });

    document.querySelectorAll('[data-i18n-title]').forEach(el => {
        const value = getTranslation(el.getAttribute('data-i18n-title'));
        if (value && typeof value === 'string') el.title = value;
    });

    setTimeout(() => {
        const searchInput = document.querySelector('.leaflet-control-geocoder-form input');
        if (searchInput) {
            searchInput.placeholder = getTranslation('geocoder.placeholder') || "Address / WGS84 coords...";
            console.log("✅ Đã cập nhật Geocoder thành:", searchInput.placeholder);
        }
    }, 500);

    updateMapLanguage(currentLang);

    if (typeof updateStatus === 'function') {
        updateStatus();
        console.log("🔄 Đã cập nhật lại trạng thái StatusBox.");
    }

    setTimeout(() => {
        const postpage = translations.postpage;
        if (!postpage) return;

        const newerLink = document.querySelector('.blog-pager-newer-link');
        const olderLink = document.querySelector('.blog-pager-older-link');
        const homeLink = document.querySelector('.home-link');

        if (newerLink) newerLink.innerHTML = postpage['newer-page-title'];
        if (olderLink) olderLink.innerHTML = postpage['older-page-title'];
        if (homeLink) homeLink.innerHTML = postpage['home-msg'];
    }, 800);
}

// ==========================================
function updateMapLanguage(langCode) {
    const lang = translations;
    if (!lang || !lang.layer || typeof map === 'undefined') return;

    if (layerControl !== null) {
        map.removeControl(layerControl);
    }

    const baseMaps = {};
    baseMaps[lang.layer.street] = googleStreets;
    baseMaps[lang.layer.satellite] = googleSatellite;
    baseMaps[lang.layer.hybrid] = googleHybrid;

    layerControl = L.control.layers(baseMaps, null, {position: 'topright'}).addTo(map);

    const controlContainer = layerControl.getContainer();
    if (controlContainer && controlContainer.parentNode) {
        controlContainer.parentNode.prepend(controlContainer);
    }
}

async function deleteMap(shortCode) {
    if (!confirm(t('auth.delete_confirm', 'Are you sure to delete this snapshot?'))) return;

    try {
        const user = firebase.auth().currentUser;
        if (!user) return;
        const token = await user.getIdToken();

        const response = await fetch('https://api.quickmapshare.com/api/delete-map/' + shortCode, {
            method: 'DELETE',
            headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' }
        });

        const result = await response.json();
        if (result.success) {
            const keyToDelete = localStorage.getItem(`dict_${shortCode}`);
            if (keyToDelete) localStorage.removeItem(keyToDelete);

            localStorage.removeItem(`dict_${shortCode}`);
            localStorage.removeItem(`offlineMap_${shortCode}`);

            if (typeof loadMyMaps === 'function') loadMyMaps(token);
        } else {
            alert(t('auth.error', 'Lỗi: ') + result.error);
        }
    } catch (err) {
        console.error("Lỗi xóa:", err);
        alert(t('auth.delete_error', 'Không thể kết nối máy chủ để xóa.'));
    }
}

async function loadMyMaps(token, retryCount = 0) {
    const listDiv = document.getElementById('my-maps-list');
    if (!listDiv) return;
    const MAX_RETRIES = 3;

    if (retryCount === 0) listDiv.innerHTML = `<div style="color:#666;text-align:center;padding:20px;">${t('auth.loading', 'Loading...')}</div>`;

    try {
        const response = await fetch('https://api.quickmapshare.com/api/my-maps', {
            method: 'GET',
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const result = await response.json();

        if (result.success && result.data) {
            if (result.data.length === 0) {
                listDiv.innerHTML = `<div style="color:#999;text-align:center;padding:20px;">${t('auth.no_maps', 'Bạn chưa có bản đồ nào.')}</div>`;
                return;
            }

            const latestMap = result.data[0];
            if (!latestMap.thumbnail_url && retryCount < MAX_RETRIES) {
                setTimeout(() => loadMyMaps(token, retryCount + 1), 1000);
            }

            listDiv.innerHTML = result.data.map(map => {
                const mapTitle = map.title || `${t('auth.snapshot', 'Snapshot ')}${map.short_code}`;
                const mapDate = new Date(map.created_at).toLocaleDateString(typeof currentLang !== 'undefined' && currentLang === 'vi' ? 'vi-VN' : 'en-US');
                const trashIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="currentColor" viewBox="0 0 16 16"><path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0V6z"/><path fill-rule="evenodd" d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1v1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118zM2.5 1v1h11V1h-11z"/></svg>`;

                const mediaHtml = map.thumbnail_url 
                  ? `<img src="${map.thumbnail_url}" style="width:50px; height:50px; object-fit:cover; border-radius:6px; border:1px solid #ddd; display:block; flex-shrink:0;" />`
                  : `<div style="width:50px; height:50px; background:#f8f9fa; border-radius:6px; flex-shrink:0; display:flex; align-items:center; justify-content:center; border:1px solid #eee; box-sizing:border-box;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 6v16l7-4 8 4 7-4V2l-7 4-8-4-7 4zm7-4v16m8-4V6"></path></svg></div>`;

                return `
                    <div style="display:flex; align-items:center; gap:12px; margin-bottom:12px; padding:8px; border-radius:8px; transition: background 0.2s;"
                         onmouseover="this.style.background='#fcfcfc'"
                         onmouseout="this.style.background='none'">
                        ${mediaHtml}
                        <div style="flex:1; min-width:0; display:flex; flex-direction:column; justify-content:center;">
                            <a href="javascript:getMapData('${map.short_code}')"
                               style="text-decoration:none; color:#1a73e8; font-weight:600; font-size:14px; margin-bottom:2px; display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-family:sans-serif;"
                               title="${mapTitle}">
                               ${mapTitle}
                            </a>
                            <span style="color:#888; font-size:11px; font-family:sans-serif;">${mapDate}</span>
                        </div>
                        <button onclick="deleteMap('${map.short_code}')"
                                style="width:28px; height:28px; border-radius:6px; border:none; background:transparent; color:#b0b0b0; cursor:pointer; display:flex; align-items:center; justify-content:center; transition: all 0.2s;"
                                title="${t('auth.delete_map', 'Xóa bản đồ')}"
                                onmouseover="this.style.background='#fdf2f2';this.style.color='#f87171'"
                                onmouseout="this.style.background='transparent';this.style.color='#b0b0b0'">
                            ${trashIcon}
                        </button>
                    </div>`;
            }).join('');
        }
    } catch (err) {
        listDiv.innerHTML = `<div style="color:red;padding:10px;text-align:center;">${t('auth.load_list_error', 'Không thể tải danh sách bản đồ.')}</div>`;
    }
}

function checkInAppBrowser() {
    const ua = navigator.userAgent || navigator.vendor || window.opera;
    const globalAppsRegex = /wv|WhatsApp|FBAV|FBAN|Instagram|Threads|Twitter|LinkedIn|Snapchat|Reddit|Pinterest|TikTok|MicroMessenger|Line|KakaoTalk|Viber|Telegram|Discord|Slack|Zalo/i;
    const isExplicitAppOrAndroidWV = globalAppsRegex.test(ua);

    const isIos = /iPhone|iPad|iPod/i.test(ua);
    const isIosWebView = isIos && /AppleWebKit/i.test(ua) && !/Safari/i.test(ua);

    const isInAppBrowser = isExplicitAppOrAndroidWV || isIosWebView;

    const warningBox = document.getElementById('inapp-warning-box');
    const signInBtn = document.getElementById('btn-login');

    if (isInAppBrowser) {
        if (warningBox) warningBox.style.display = 'block';
        if (signInBtn) signInBtn.style.display = 'none';
        console.log("⚠️ Global In-app Browser detected. Google Sign-in button disabled.");
    }
}
